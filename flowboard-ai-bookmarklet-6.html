<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlowBoard AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f1117;color:white;min-height:100vh;padding:30px 20px;direction:rtl}
.container{max-width:500px;margin:0 auto;text-align:center}
h1{font-size:24px;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
p{color:#8892a4;font-size:13px;margin-bottom:24px}
.box{background:#1a1f2e;border-radius:12px;padding:20px;margin:16px 0;text-align:right}
.box h3{color:#3b82f6;margin-bottom:12px;font-size:14px}
.step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.num{background:#2563eb;color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.txt{color:#cbd5e1;font-size:13px;line-height:1.5}
.txt strong{color:white}
#btn{display:block;width:100%;background:linear-gradient(135deg,#2563eb,#7c3aed);color:white;padding:16px;border-radius:10px;text-align:center;font-size:16px;font-weight:700;text-decoration:none;margin:16px 0;cursor:grab}
.hint{color:#6b7280;font-size:11px;margin-top:6px}
.ok{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:8px;padding:10px;color:#86efac;font-size:12px;margin-top:12px}
</style>
</head>
<body>
<div class="container">
<h1>🤖 FlowBoard AI</h1>
<p>تحليل ذكي للحجوزات — بضغطة وحدة</p>
<div class="box">
<h3>📌 طريقة التثبيت</h3>
<div class="step"><div class="num">1</div><div class="txt">فعّل شريط المفضلة: <strong>Cmd+Shift+B</strong></div></div>
<div class="step"><div class="num">2</div><div class="txt"><strong>اسحب الزر الأزرق</strong> لشريط المفضلة</div></div>
<div class="step"><div class="num">3</div><div class="txt">افتح <strong>FlowBoard</strong> وسجل الدخول</div></div>
<div class="step"><div class="num">4</div><div class="txt">اضغط الزر — يطلع التحليل فوراً!</div></div>
</div>
<a id="btn" href="#">🤖 FlowBoard AI — اسحب للمفضلة</a>
<div class="hint">⬆️ اسحب هذا الزر لشريط المفضلة</div>
<div class="ok">✅ يشتغل مع كل موظف بيوزره الخاص</div>
</div>
<script>
document.getElementById('btn').href="javascript:(function(){var s=document.createElement('script');s.src='https://huseinali8282-blip.github.io/Kenzi-dashboard-Noshow/fb-ai.js?t='+Date.now();document.head.appendChild(s);})();";
</script>
</body>
</html>
